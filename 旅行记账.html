<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>旅行记账</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;min-height:100dvh;
  background:linear-gradient(160deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  color:#e2e8f0;max-width:480px;margin:0 auto;padding:0 0 24px;overflow-x:hidden;
}
.header{padding:28px 20px 12px;text-align:center}
.title{font-size:26px;font-weight:800;background:linear-gradient(135deg,#4ECDC4,#FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:12px;color:#64748b;margin-top:4px}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-radius:16px;border:1px solid rgba(255,255,255,.08);margin:0 16px 14px;padding:18px}
.label{font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:8px;letter-spacing:1px}
.input{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2e8f0;font-size:15px;outline:none}
.input::placeholder{color:#475569}
.row{display:flex;gap:8px}
.fw{display:flex;flex-wrap:wrap;gap:8px}
.tag{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:14px}
.tag .x{cursor:pointer;color:#64748b;margin-left:2px;font-size:12px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid rgba(255,255,255,.1);background:transparent;color:#94a3b8;transition:all .2s;margin:0 8px 8px 0}
.chip.on{border-color:var(--c);background:var(--bg);color:var(--c)}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nav{display:flex;gap:6px;margin:0 16px 14px}
.nb{flex:1;padding:10px 0;border-radius:10px;border:none;background:rgba(255,255,255,.04);color:#64748b;font-size:13px;font-weight:600;cursor:pointer}
.nb.on{background:rgba(78,205,196,.15);color:#4ECDC4}
.addb{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 16px 14px;padding:16px 0;border-radius:14px;border:2px dashed rgba(78,205,196,.4);background:rgba(78,205,196,.08);color:#4ECDC4;font-size:16px;font-weight:700;cursor:pointer}
.ei{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ei:last-child{border-bottom:none}
.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:4px 8px;opacity:.6}
.btn{padding:14px 0;width:100%;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.bp{background:linear-gradient(135deg,#4ECDC4,#2BAB9F)}.bs{background:rgba(255,255,255,.08)}
.sb{flex:1;text-align:center;padding:12px 0}
.sn{font-size:22px;font-weight:800;color:#4ECDC4}.sl{font-size:11px;color:#64748b;margin-top:4px}
.sd{width:1px;background:rgba(255,255,255,.08)}
.cd{background:rgba(0,0,0,.3);border-radius:12px;padding:14px 18px;text-align:right;font-family:'SF Mono','Courier New',monospace}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.ck{padding:14px 0;border-radius:12px;border:none;font-size:20px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.08);color:#e2e8f0}
.ck.op{background:rgba(78,205,196,.2);color:#4ECDC4}
.ck.ac{background:rgba(255,107,107,.15);color:#FF6B6B}
.mb{flex:1;padding:10px 0;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer}
.mb.on{background:rgba(78,205,196,.2);color:#4ECDC4}.mb.off{background:rgba(255,255,255,.06);color:#64748b}
.sr{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,.04);border:2px solid transparent;transition:all .2s}
.sr.on{background:rgba(78,205,196,.1);border-color:rgba(78,205,196,.4)}
.db{margin-top:8px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;text-align:center}
.dok{background:rgba(52,211,153,.1);color:#34D399}.dbd{background:rgba(255,107,107,.1);color:#FF6B6B}
.empty{text-align:center;padding:30px 0;color:#475569}
.lk{font-size:12px;color:#4ECDC4;cursor:pointer;font-weight:600;background:none;border:none}
/* Share modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#1e293b;border-radius:20px;border:1px solid rgba(255,255,255,.1);padding:24px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal textarea{width:100%;min-height:120px;padding:12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#4ECDC4;font-size:12px;font-family:'SF Mono','Courier New',monospace;outline:none;resize:vertical;word-break:break-all}
.share-btns{display:flex;gap:8px;margin:0 16px 14px}
.share-btn{flex:1;padding:12px 0;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.share-export{background:rgba(78,205,196,.15);color:#4ECDC4}
.share-import{background:rgba(255,230,109,.15);color:#FFE66D}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#34D399;color:#0f172a;padding:10px 24px;border-radius:10px;font-weight:700;font-size:14px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="app"></div>

<script>
const C=["#FF6B6B","#4ECDC4","#FFE66D","#A78BFA","#F97316","#34D399","#F472B6","#60A5FA"];
const E=["😎","🐱","🌸","🔥","⭐","🍕","🎯","💎"];
let members=[],expenses=[],page="home",modal=null;
let form={desc:"",amount:"0",payer:"",split:[],splitMode:"equal",splitAmounts:{}},calcTarget="amount";

function save(){try{localStorage.setItem("t_m",JSON.stringify(members));localStorage.setItem("t_e",JSON.stringify(expenses))}catch(e){}}
function load(){try{const m=localStorage.getItem("t_m"),e=localStorage.getItem("t_e");if(m)members=JSON.parse(m);if(e)expenses=JSON.parse(e)}catch(e){}}
load();

function fmt(n){return(n<0?"-":"")+"¥"+Math.abs(n).toFixed(2)}
function ev(expr){try{const t=expr.match(/[+\-]?[^+\-]+/g)||["0"];const r=t.reduce((s,t)=>s+parseFloat(t||0),0);if(isNaN(r)||!isFinite(r))return"0";return r%1===0?String(r):String(Math.round(r*100)/100)}catch{return"0"}}
function gn(s){const v=parseFloat(ev(s||"0"));return isNaN(v)?0:Math.max(0,v)}
function gm(n){return members.find(m=>m.name===n)||{emoji:"👤",color:"#999"}}

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000)}

// Share: encode data to base64 string
function exportData(){
  const data=JSON.stringify({m:members,e:expenses});
  const encoded=btoa(unescape(encodeURIComponent(data)));
  // Wrap with markers for easy copy
  return "📊旅行记账数据📊\n" + encoded + "\n📊END📊";
}

function importData(text){
  try{
    // Extract base64 between markers
    let b64 = text.trim();
    if(b64.includes("📊旅行记账数据📊")){
      b64 = b64.split("📊旅行记账数据📊")[1].split("📊END📊")[0].trim();
    }
    const json=decodeURIComponent(escape(atob(b64)));
    const data=JSON.parse(json);
    if(data.m && Array.isArray(data.m)){
      members=data.m;
      expenses=data.e||[];
      save();
      modal=null;
      toast("✅ 导入成功！");
      render();
      return true;
    }
  }catch(e){
    toast("❌ 数据格式有误");
  }
  return false;
}

function showExportModal(){
  modal="export";
  render();
  setTimeout(()=>{
    const ta=document.getElementById("shareTA");
    if(ta){ta.value=exportData();ta.select();}
  },50);
}

function showImportModal(){modal="import";render()}
function closeModal(){modal=null;render()}

function copyExport(){
  const ta=document.getElementById("shareTA");
  if(ta){
    ta.select();
    try{
      navigator.clipboard.writeText(ta.value).then(()=>toast("✅ 已复制！粘贴到微信群即可"));
    }catch{
      document.execCommand("copy");
      toast("✅ 已复制！粘贴到微信群即可");
    }
  }
}

function doImport(){
  const ta=document.getElementById("importTA");
  if(ta&&ta.value.trim())importData(ta.value);
}

function clearAll(){
  if(confirm("确定要清空所有数据吗？")){
    members=[];expenses=[];save();render();toast("已清空");
  }
}

function calcBal(){
  const b={};members.forEach(m=>b[m.name]=0);
  expenses.forEach(e=>{b[e.payer]=(b[e.payer]||0)+e.amount;Object.entries(e.splitAmounts).forEach(([n,a])=>{b[n]=(b[n]||0)-a})});
  return b;
}
function calcSettle(){
  const b=calcBal(),d=[],c=[];
  Object.entries(b).forEach(([n,a])=>{if(a<-.01)d.push({name:n,amount:-a});else if(a>.01)c.push({name:n,amount:a})});
  d.sort((a,b)=>b.amount-a.amount);c.sort((a,b)=>b.amount-a.amount);
  const r=[];let i=0,j=0;
  while(i<d.length&&j<c.length){const p=Math.min(d[i].amount,c[j].amount);if(p>.01)r.push({from:d[i].name,to:c[j].name,amount:p});d[i].amount-=p;c[j].amount-=p;if(d[i].amount<.01)i++;if(c[j].amount<.01)j++}
  return r;
}

function hck(k){
  const cur=calcTarget==="amount"?form.amount:(form.splitAmounts[calcTarget]||"0");
  let next=cur;
  if(k==="C")next="0";
  else if(k==="⌫")next=cur.length>1?cur.slice(0,-1):"0";
  else if(k==="."){const ps=cur.split(/[+\-]/);if(!ps[ps.length-1].includes("."))next=cur+"."}
  else if(k==="+"||k==="-")next=ev(cur)+k;
  else if(k==="=")next=ev(cur);
  else next=cur==="0"?k:cur+k;
  if(calcTarget==="amount")form.amount=next;else form.splitAmounts[calcTarget]=next;
  render();
}

function addMember(){
  const inp=document.getElementById("mi");const name=inp.value.trim();
  if(!name||members.find(m=>m.name===name))return;
  members.push({name,color:C[members.length%C.length],emoji:E[members.length%E.length]});
  inp.value="";save();render();
}
function rmMember(n){members=members.filter(m=>m.name!==n);expenses=expenses.filter(e=>e.payer!==n&&!Object.keys(e.splitAmounts).includes(n));save();render()}
function delExp(id){expenses=expenses.filter(e=>e.id!==id);save();render()}

function startAdd(){
  const ia={};members.forEach(m=>{ia[m.name]="0"});
  form={desc:"",amount:"0",payer:"",split:members.map(m=>m.name),splitMode:"equal",splitAmounts:ia};
  calcTarget="amount";page="add";render();
}
function sub(){
  const total=gn(form.amount);if(!form.desc||total<=0||!form.payer)return;
  let fs={};
  if(form.splitMode==="equal"){if(!form.split.length)return;const sh=total/form.split.length;form.split.forEach(n=>{fs[n]=sh})}
  else{members.forEach(m=>{const v=gn(form.splitAmounts[m.name]);if(v>0)fs[m.name]=v});const ct=Object.values(fs).reduce((s,v)=>s+v,0);if(!Object.keys(fs).length||Math.abs(total-ct)>.01)return}
  expenses.push({id:Date.now(),desc:form.desc,amount:total,payer:form.payer,splitAmounts:fs,time:new Date().toLocaleString("zh-CN")});
  page="home";calcTarget="amount";save();render();
}
function tSplit(n){const i=form.split.indexOf(n);if(i>=0)form.split.splice(i,1);else form.split.push(n);render()}
function tAll(){form.split=form.split.length===members.length?[]:members.map(m=>m.name);render()}
function sMode(m){form.splitMode=m;calcTarget="amount";render()}
function sPay(n){form.payer=n;render()}
function sCT(t){calcTarget=t;render()}
function go(p){page=p;render()}

// ===== RENDER =====
function render(){
  const a=document.getElementById("app");
  let h="";
  if(page==="home")h=rHome();
  else if(page==="add")h=rAdd();
  else if(page==="detail")h=rDetail();
  else if(page==="settle")h=rSettle();
  if(modal)h+=rModal();
  a.innerHTML=h;
}

function rNav(ac){
  return`<div class="nav"><button class="nb ${ac==='home'?'on':''}" onclick="go('home')">📝 账单</button><button class="nb ${ac==='detail'?'on':''}" onclick="go('detail')">👥 明细</button><button class="nb ${ac==='settle'?'on':''}" onclick="go('settle')">💰 结算</button></div>`;
}
function rCalc(){
  const ks=[["7","8","9","⌫"],["4","5","6","+"],["1","2","3","-"],["C","0",".","="]];
  return`<div class="cg">${ks.flat().map(k=>{const cl=["+","-","="].includes(k)?"op":["C","⌫"].includes(k)?"ac":"";return`<button class="ck ${cl}" onclick="hck('${k}')">${k}</button>`}).join("")}</div>`;
}

function rModal(){
  if(modal==="export") return`
    <div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>📤 分享数据给朋友</h3>
        <p style="font-size:13px;color:#94a3b8;margin-bottom:12px;text-align:center">复制下方文字，发到微信群里。朋友打开这个页面后点「导入数据」粘贴即可同步。</p>
        <textarea id="shareTA" readonly></textarea>
        <div style="margin-top:12px;display:flex;gap:10px">
          <button class="btn bs" style="flex:1" onclick="closeModal()">取消</button>
          <button class="btn bp" style="flex:2" onclick="copyExport()">📋 复制到剪贴板</button>
        </div>
      </div>
    </div>`;
  if(modal==="import") return`
    <div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>📥 导入朋友的数据</h3>
        <p style="font-size:13px;color:#94a3b8;margin-bottom:12px;text-align:center">把朋友发在群里的那段数据文字粘贴到下方，点导入即可同步。</p>
        <textarea id="importTA" placeholder="粘贴数据到这里..."></textarea>
        <div style="margin-top:12px;display:flex;gap:10px">
          <button class="btn bs" style="flex:1" onclick="closeModal()">取消</button>
          <button class="btn bp" style="flex:2" onclick="doImport()">📥 确认导入</button>
        </div>
      </div>
    </div>`;
  return"";
}

function rHome(){
  const ts=expenses.reduce((s,e)=>s+e.amount,0);
  return`
  <div class="header">
    <div class="title">✈️ 旅行记账</div>
    <div class="sub">离线可用 · 微信分享同步</div>
  </div>

  <div class="share-btns">
    <button class="share-btn share-export" onclick="showExportModal()">📤 分享数据</button>
    <button class="share-btn share-import" onclick="showImportModal()">📥 导入数据</button>
  </div>

  <div class="card">
    <div class="label">成员</div>
    <div class="row" style="margin-bottom:${members.length?12:0}px">
      <input class="input" style="flex:1" id="mi" placeholder="输入名字添加成员..." onkeydown="if(event.key==='Enter')addMember()">
      <button onclick="addMember()" style="padding:0 18px;border-radius:10px;border:none;background:rgba(78,205,196,.2);color:#4ECDC4;font-weight:700;font-size:20px;cursor:pointer">+</button>
    </div>
    <div class="fw">
      ${members.map(m=>`<div class="tag" style="background:${m.color}20"><span>${m.emoji}</span><span style="color:${m.color};font-weight:600">${m.name}</span><span class="x" onclick="rmMember('${m.name}')">✕</span></div>`).join("")}
    </div>
  </div>

  ${ts>0?`<div class="card" style="display:flex">
    <div class="sb"><div class="sn">${fmt(ts)}</div><div class="sl">总支出</div></div>
    <div class="sd"></div>
    <div class="sb"><div class="sn">${expenses.length}</div><div class="sl">笔账单</div></div>
    <div class="sd"></div>
    <div class="sb"><div class="sn">${members.length}</div><div class="sl">人</div></div>
  </div>`:""}

  ${rNav("home")}
  ${members.length>=2?`<button class="addb" onclick="startAdd()">＋ 添加新账单</button>`:""}

  <div class="card">
    ${expenses.length===0?`<div class="empty"><div style="font-size:40px;margin-bottom:10px">📋</div><div>还没有账单哦</div><div style="font-size:12px;margin-top:4px">${members.length<2?"添加至少2个成员后开始记账":"点击上方按钮添加第一笔"}</div></div>`:
    [...expenses].reverse().map(e=>{
      const m=gm(e.payer),ns=Object.keys(e.splitAmounts),vs=Object.values(e.splitAmounts);
      const eq=vs.length>0&&vs.every(v=>Math.abs(v-vs[0])<.01);
      return`<div class="ei">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          <div class="av" style="background:${m.color}30">${m.emoji}</div>
          <div style="min-width:0">
            <div style="font-weight:700;font-size:15px">${e.desc}</div>
            <div style="font-size:12px;color:#64748b;margin-top:2px">${e.payer} 付款 · ${ns.length}人${eq?"均摊":"自定义"}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <div style="font-weight:800;font-size:16px;color:#FFE66D">¥${e.amount.toFixed(2)}</div>
          <button class="del" onclick="delExp(${e.id})">🗑</button>
        </div>
      </div>`}).join("")}
  </div>

  ${expenses.length>0?`<div style="text-align:center;padding:8px"><button class="lk" style="color:#FF6B6B;font-size:12px" onclick="clearAll()">🗑 清空所有数据</button></div>`:""}`;
}

function rAdd(){
  const total=gn(form.amount);
  const cd=calcTarget==="amount"?form.amount:(form.splitAmounts[calcTarget]||"0");
  const ct=form.splitMode==="custom"?members.reduce((s,m)=>s+gn(form.splitAmounts[m.name]),0):0;
  const diff=total-ct;
  const ok=form.desc&&total>0&&form.payer&&(form.splitMode==="equal"?form.split.length>0:Math.abs(diff)<.01&&ct>0);

  return`
  <div class="header"><div class="title" style="font-size:22px">➕ 添加账单</div></div>
  <div class="card">
    <div class="label">消费描述</div>
    <input class="input" id="di" placeholder="例：午餐、门票、打车..." value="${form.desc}" oninput="form.desc=this.value">
  </div>
  <div class="card">
    <div class="label">谁付的钱？</div>
    <div style="display:flex;flex-wrap:wrap">
      ${members.map(m=>`<div class="chip ${form.payer===m.name?'on':''}" style="--c:${m.color};--bg:${m.color}22" onclick="sPay('${m.name}')">${m.emoji} ${m.name}</div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="label">${calcTarget==="amount"?"总金额 (¥)":calcTarget+" 的分摊额"}</div>
      ${calcTarget!=="amount"?`<button class="lk" onclick="sCT('amount')">← 总金额</button>`:""}
    </div>
    <div class="cd">
      <div style="font-size:12px;color:#64748b;margin-bottom:4px">${calcTarget==="amount"?"¥ 总金额":"¥ "+calcTarget}</div>
      <div style="font-size:30px;font-weight:800;word-break:break-all;color:${calcTarget==="amount"?"#4ECDC4":"#FFE66D"}">${cd}</div>
    </div>
    ${rCalc()}
  </div>
  <div class="card">
    <div class="label">分摊方式</div>
    <div class="row" style="margin-bottom:14px">
      <button class="mb ${form.splitMode==='equal'?'on':'off'}" onclick="sMode('equal')">均摊</button>
      <button class="mb ${form.splitMode==='custom'?'on':'off'}" onclick="sMode('custom')">自定义金额</button>
    </div>
    ${form.splitMode==="equal"?`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;color:#94a3b8">选择参与的人</div>
        <button class="lk" onclick="tAll()">${form.split.length===members.length?"取消全选":"全选"}</button>
      </div>
      <div style="display:flex;flex-wrap:wrap">
        ${members.map(m=>`<div class="chip ${form.split.includes(m.name)?'on':''}" style="--c:${m.color};--bg:${m.color}22" onclick="tSplit('${m.name}')">${m.emoji} ${m.name}</div>`).join("")}
      </div>
      ${form.split.length>0&&total>0?`<div style="font-size:13px;color:#64748b;margin-top:8px">人均: ¥${(total/form.split.length).toFixed(2)}</div>`:""}
    `:`
      <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">点击每人的金额区域，用上方计算器输入</div>
      ${members.map(m=>{const v=gn(form.splitAmounts[m.name]);return`<div class="sr ${calcTarget===m.name?'on':''}" onclick="sCT('${m.name}')">
        <div class="av" style="background:${m.color}30">${m.emoji}</div>
        <div style="flex:1;font-weight:600">${m.name}</div>
        <div style="font-weight:800;font-size:18px;font-family:'SF Mono','Courier New',monospace;color:${v>0?'#FFE66D':'#475569'}">¥${v.toFixed(2)}</div>
      </div>`}).join("")}
      <div class="db ${total>0&&Math.abs(diff)<.01?'dok':'dbd'}">
        ${total<=0?"⚠️ 请先输入总金额":Math.abs(diff)<.01?"✅ 分摊金额正好等于总额":diff>0?`⚠️ 还差 ¥${diff.toFixed(2)} 未分配`:`⚠️ 超出 ¥${Math.abs(diff).toFixed(2)}`}
      </div>
    `}
  </div>
  <div style="margin:0 16px;display:flex;gap:10px">
    <button class="btn bs" style="flex:1" onclick="go('home')">取消</button>
    <button class="btn bp" style="flex:2;opacity:${ok?1:.4}" onclick="sub()">确认添加</button>
  </div>`;
}

function rDetail(){
  const bal=calcBal();
  return`
  <div class="header"><div class="title" style="font-size:22px">👥 个人明细</div></div>
  ${rNav("detail")}
  ${members.length===0?`<div class="card empty" style="padding:30px">请先添加成员</div>`:
  members.map(m=>{
    const paid=expenses.filter(e=>e.payer===m.name).reduce((s,e)=>s+e.amount,0);
    const owed=expenses.reduce((s,e)=>s+(e.splitAmounts[m.name]||0),0);
    const b=bal[m.name]||0;
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div class="av" style="background:${m.color}30">${m.emoji}</div>
        <div style="font-weight:700;font-size:17px">${m.name}</div>
        <div style="margin-left:auto;font-weight:800;font-size:16px;color:${b>=0?'#4ECDC4':'#FF6B6B'}">
          ${b>=0?"应收 ":"应付 "}${fmt(Math.abs(b))}
        </div>
      </div>
      <div style="display:flex;gap:12px;font-size:13px;color:#94a3b8">
        <span>已付: <b style="color:#4ECDC4">¥${paid.toFixed(2)}</b></span>
        <span>应摊: <b style="color:#FFE66D">¥${owed.toFixed(2)}</b></span>
      </div>
    </div>`}).join("")}`;
}

function rSettle(){
  const ss=calcSettle();
  return`
  <div class="header"><div class="title" style="font-size:22px">💰 结算方案</div><div class="sub">最简转账方式</div></div>
  ${rNav("settle")}
  ${ss.length===0?`<div class="card empty" style="padding:30px"><div style="font-size:40px;margin-bottom:10px">✅</div>${expenses.length===0?"还没有账单":"大家已经两清啦！"}</div>`:
  ss.map(i=>{const f=gm(i.from),t=gm(i.to);return`<div class="card" style="display:flex;align-items:center;gap:12px">
    <div class="av" style="background:${f.color}30">${f.emoji}</div>
    <div style="flex:1"><div style="font-weight:700">${i.from}</div><div style="font-size:12px;color:#64748b">转给 ${i.to}</div></div>
    <div style="font-size:13px;color:#64748b">→</div>
    <div class="av" style="background:${t.color}30">${t.emoji}</div>
    <div style="font-weight:800;font-size:18px;color:#FFE66D;min-width:80px;text-align:right">¥${i.amount.toFixed(2)}</div>
  </div>`}).join("")}`;
}

render();
</script>
</body>
</html>
